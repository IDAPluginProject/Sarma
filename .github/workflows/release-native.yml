name: Build Native Installers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Native target to build
        required: true
        default: all
        type: choice
        options:
          - all
          - windows-x86_64
          - macos-arm64
          - linux-x86_64
          - linux-arm64
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  select-targets:
    name: Select Native Targets
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    env:
      TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os

          targets = {
              "windows-x86_64": {
                  "name": "windows-x86_64",
                  "runner": "windows-latest",
                  "os": "windows",
                  "arch": "x86_64",
                  "formats": "msi",
              },
              "macos-arm64": {
                  "name": "macos-arm64",
                  "runner": "macos-14",
                  "os": "macos",
                  "arch": "arm64",
                  "formats": "pkg",
              },
              "linux-x86_64": {
                  "name": "linux-x86_64",
                  "runner": "ubuntu-24.04",
                  "os": "linux",
                  "arch": "x86_64",
                  "formats": "deb,pkg",
              },
              "linux-arm64": {
                  "name": "linux-arm64",
                  "runner": "ubuntu-24.04-arm",
                  "os": "linux",
                  "arch": "arm64",
                  "formats": "deb,pkg",
              },
          }

          target = os.environ["TARGET"]
          if target == "all":
              include = list(targets.values())
          elif target in targets:
              include = [targets[target]]
          else:
              raise SystemExit(f"Unknown target: {target}")

          matrix = json.dumps({"include": include}, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
          PY

  build:
    name: ${{ matrix.name }}
    needs: select-targets
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-targets.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up .NET SDK
        if: matrix.os == 'windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Linux packaging tools
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file zstd
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y clang lld
          fi

      - name: Build native release on Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          scripts\build_native_windows.ps1 `
            -Arch "${{ matrix.arch }}" `
            -Formats "${{ matrix.formats }}" `
            -Jobs 4

      - name: Build native release on Linux
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sh scripts/build_native_linux.sh \
            --arch "${{ matrix.arch }}" \
            --formats "${{ matrix.formats }}" \
            --jobs 4

      - name: Build native release on macOS
        if: matrix.os == 'macos'
        shell: bash
        run: |
          sh scripts/build_native_macos.sh \
            --arch "${{ matrix.arch }}" \
            --formats "${{ matrix.formats }}" \
            --jobs 4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sarma-${{ matrix.name }}
          path: dist/packages/sarma-*
          if-no-files-found: error

  release:
    name: Attach Native Installers To Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/sarma-*
